services:
  # 1. Asosiy Veb-sayt va User Bot (Node.js)
  - type: web
    name: yozgo-web-service
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm run db:push && node dist/index.cjs

  # 2. Admin Bot (Python Background Worker)
  - type: worker
    name: yozgo-admin-bot
    env: python
    buildCommand: pip install -r admin_bot/requirements.txt
    startCommand: python admin_bot/main.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromService:
          type: web
          name: yozgo-web-service
          property: envVar
          envVar: DATABASE_URL
      - key: ADMIN_BOT_TOKEN
        sync: false # Admin bot token (Secret)
      - key: ADMIN_API_TOKEN
        sync: false # API communication token
      - key: ADMIN_TELEGRAM_ID
        sync: false # Admin Telegram ID
      - key: API_URL
        value: https://yozgo-backend.onrender.com/api/admin

