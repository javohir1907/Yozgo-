services:
  # 1. Asosiy Veb-sayt va User Bot (Node.js)
  - type: web
    name: yozgo-web-service
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm run db:push && node dist/index.js

  # NOTE: Admin Bot (Python worker) bloki olib tashlandi — admin_bot/ papkasi
  # repodan o'chirilgan, shuning uchun `pip install -r admin_bot/requirements.txt`
  # deploy'da xato berardi.
